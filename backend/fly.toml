# Fly.io configuration
app = "swrm-api"
primary_region = "iad"  # US East

[build]
  builder = "heroku/buildpacks:20"
  buildpacks = ["burn-the-world/fly-bun"]

[deploy]
  strategy = "rolling"
  
[env]
  PORT = "3001"
  NODE_ENV = "production"

[mounts]
  data = "1gb"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = true
  min_machines_running = 1
  
  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
