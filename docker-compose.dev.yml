# Swrm Development Environment
# 
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d
#   docker-compose -f docker-compose.dev.yml down
#
# Services:
#   - convex: Local Convex backend (ports 3210, 3211)
#   - zeroclaw: Optional ZeroClaw agent container for testing

version: "3.8"

services:
  # Local Convex Backend
  # Runs Convex in development mode with persistent storage
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: swrm-convex
    ports:
      - "3210:3210"  # Cloud API
      - "3211:3211"  # Site/Dashboard
    volumes:
      - convex_data:/convex/data
    environment:
      - CONVEX_INSTANCE_NAME=swrm-dev
      - CONVEX_DEPLOYMENT_NAME=dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ZeroClaw Agent Container (optional)
  # For testing agent connectivity without full orchestration
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: swrm-zeroclaw-test
    ports:
      - "42617:42617"  # Agent Gateway
    volumes:
      - swrm-shared:/workspace  # Shared workspace for agents
    environment:
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_GATEWAY_HOST=0.0.0.0
      - ZEROCLAW_MEMORY_BACKEND=sqlite
      - ZEROCLAW_MEMORY_AUTO_SAVE=true
      - ZEROCLAW_AUTONOMY_LEVEL=supervised
      # Set your API key for testing:
      # - ZEROCLAW_API_KEY=your-api-key
      # - ZEROCLAW_PROVIDER=openai
    profiles:
      - testing  # Only start with: docker-compose --profile testing up
    restart: unless-stopped

volumes:
  # Convex data persistence
  convex_data:
    driver: local

  # Shared workspace for agents
  # All agent containers mount this to share files
  swrm-shared:
    driver: local
    name: swrm-shared
